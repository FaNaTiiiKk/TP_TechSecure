{% extends 'base.html' %}

{% block content %}
<section class="section">
    <h2>AJOUTER UNE FILIALE</h2>
    <p class="intro">Renseignez les informations de la nouvelle agence régionale.</p>

    <form action="{{ url_for('ajouter_filiale') }}" method="POST">
        <div class="form-grid">
            <div>
                <div class="form-group">
                    <label>Ville</label>
                    <input type="text" name="ville" placeholder="Ex : Lyon" required>
                </div>
                <div class="form-group">
                    <label>Adresse</label>
                    <input type="text" name="adresse" placeholder="Ex : 45 Rue de la République" required>
                </div>
                <div class="form-group">
                    <label>Responsable</label>
                    <input type="text" name="responsable" placeholder="Ex : Sophie Martin" required>
                </div>
            </div>

            <div>
                <div class="form-group">
                    <label>Nombre d'employés</label>
                    <input type="number" name="employes" placeholder="Ex : 42" required>
                </div>
                <div class="form-group">
                    <label>Adresse IP du routeur</label>
                    <input type="text" name="ip_reseau" placeholder="Ex : 192.168.2.1" required>
                </div>
                <div class="form-group" style="margin-top: 45px;">
                    <button type="submit" class="btn" style="width: 100%;">ENREGISTRER LA FILIALE</button>
                </div>
            </div>
        </div>
    </form>
</section>
{% endblock %}
