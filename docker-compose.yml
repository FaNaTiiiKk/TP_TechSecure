version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: techsecure_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: techsecure_db
    volumes:
      # Correction apportée ici (.d au lieu de .dir)
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - techsecure_network

  web:
    build: ./app
    container_name: techsecure_flask
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=techsecure_db
    depends_on:
      - db
    networks:
      - techsecure_network

volumes:
  mysql_data:

networks:
  techsecure_network:
    driver: bridge